/* ═══════════════════════════════════════════════════════════
   BizConnect v3 — Dark Premium Theme
   ═══════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Dark Background Layers */
  --bg:#0b0b14;--bg2:#0f0f1a;
  --white:#151524;--white-hover:#1c1c30;
  /* Grays (inverted for dark mode) */
  --gray-50:#1a1a2c;--gray-100:#1f1f34;--gray-200:#282845;--gray-300:#353558;
  --gray-400:#6a6a88;--gray-500:#8a8aa5;--gray-600:#a8a8c0;--gray-700:#c4c4d8;--gray-800:#e0e0ef;
  /* Primary — Emerald (works beautifully on dark) */
  --emerald:#34d399;--emerald-light:#6ee7b7;--emerald-bg:rgba(52,211,153,.08);--emerald-border:rgba(52,211,153,.2);
  /* Navy repurposed as light text */
  --navy:#e8e8f2;
  /* Status Colors */
  --orange:#fbbf24;--orange-bg:rgba(251,191,36,.08);
  --red:#f87171;--red-bg:rgba(248,113,113,.08);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,.08);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.08);
  --pink:#f472b6;--pink-bg:rgba(244,114,182,.08);
  /* Sizing */
  --radius:14px;--radius-sm:10px;--radius-lg:18px;--radius-xl:22px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  --shadow:0 2px 8px rgba(0,0,0,.3),0 1px 3px rgba(0,0,0,.2);
  --shadow-md:0 4px 12px rgba(0,0,0,.35);
  --shadow-lg:0 8px 24px rgba(0,0,0,.4);
  /* Font */
  --font:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-display:'Outfit','Pretendard',sans-serif;
  /* Safe Areas */
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --nav-h:calc(64px + var(--sab));
}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--navy);-webkit-font-smoothing:antialiased;overflow:hidden;height:100dvh;font-size:15px;line-height:1.6}
input,textarea,select,button{font-family:var(--font);outline:none;-webkit-appearance:none}
::placeholder{color:var(--gray-400)}
::-webkit-scrollbar{width:0;height:0}
a{text-decoration:none;color:inherit}
#root{max-width:480px;margin:0 auto;height:100dvh;position:relative;overflow:hidden;background:var(--bg)}

:focus-visible{outline:3px solid var(--emerald);outline-offset:2px;border-radius:4px}
button:focus:not(:focus-visible){outline:none}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes skeletonPulse{0%,100%{opacity:.6}50%{opacity:.25}}
@keyframes glow{0%,100%{box-shadow:0 0 16px rgba(52,211,153,.12)}50%{box-shadow:0 0 32px rgba(52,211,153,.25)}}
.fi{animation:fadeIn .35s ease both}
.fi1{animation:fadeIn .35s ease .05s both}
.fi2{animation:fadeIn .35s ease .1s both}
.fi3{animation:fadeIn .35s ease .15s both}
.fi4{animation:fadeIn .35s ease .2s both}
.skel{background:var(--gray-100);border-radius:var(--radius-sm);animation:skeletonPulse 1.5s ease-in-out infinite}

.input-field{
  background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--radius);
  padding:14px 16px;font-size:15px;color:var(--navy);width:100%;transition:border-color .15s;
}
.input-field:focus{border-color:var(--emerald);box-shadow:0 0 0 3px var(--emerald-bg)}
.input-error{border-color:var(--red)!important}
.input-error-text{color:var(--red);font-size:12px;margin-top:4px;font-weight:500}

.btn-primary{
  background:var(--emerald);color:#0b0b14;border:none;border-radius:var(--radius);
  padding:15px 28px;font-size:15px;font-weight:700;cursor:pointer;
  transition:transform .1s,opacity .1s;display:flex;align-items:center;justify-content:center;gap:8px;
  min-height:48px;letter-spacing:-.2px;
}
.btn-primary:active{transform:scale(.97);opacity:.85}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

.btn-secondary{
  background:var(--white);color:var(--navy);border:1.5px solid var(--gray-200);
  border-radius:var(--radius);padding:15px 28px;font-size:15px;font-weight:600;
  cursor:pointer;transition:all .15s;min-height:48px;
}
.btn-secondary:hover{border-color:var(--emerald-border);background:var(--white-hover)}
.btn-secondary:active{transform:scale(.97)}

.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:var(--radius-sm);font-size:12px;font-weight:700}
.card{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1px solid var(--gray-100);transition:border-color .15s,transform .1s}
.card:hover{border-color:var(--gray-200)}
.card-sm{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm);border:1px solid var(--gray-100)}

.safe-top{padding-top:var(--sat)}
.safe-bottom{padding-bottom:calc(var(--nav-h) + 8px)}

/* Noise overlay for texture */
body::before{content:'';position:fixed;inset:0;opacity:.018;pointer-events:none;z-index:9998;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
</style>

const {useState,useEffect,useCallback,useMemo,createContext,useContext,useRef}=React;

// ═══════ Storage Keys (지시서 1-6 데이터 지속성) ═══════
const STORAGE_KEYS={
  USERS:'bc2_users', CURRENT:'bc2_current', REQUESTS:'bc2_requests',
  CONTACTS:'bc2_contacts', NOTIFICATIONS:'bc2_notifs',
  SIGNALS:'bc2_signals', INTROS:'bc2_intros',
  RECENT_SEARCHES:'bc2_recent', INITIALIZED:'bc2_init_v3'
};

function loadFromStorage(key, fallback=null){
  try{const val=localStorage.getItem(key);return val?JSON.parse(val):fallback}catch{return fallback}
}
function saveToStorage(key, value){
  try{localStorage.setItem(key,JSON.stringify(value))}catch(e){console.warn('Storage save failed:',e)}
}

// ═══════ Company & Seed Data (지시서 2-1 핵심 데이터) ═══════
const COMPANIES=[

  {name:"현대자동차",industry:"자동차",logo:"🚗",verified:true},

  {name:"크래프톤",industry:"게임",logo:"🎮",verified:true},
  {name:"야놀자",industry:"여행/숙박",logo:"🏨",verified:false},
  {name:"리디",industry:"콘텐츠",logo:"📚",verified:false},
  {name:"뱅크샐러드",industry:"핀테크",logo:"🥗",verified:false},
  {name:"오늘의집",industry:"인테리어",logo:"🏠",verified:true},

const DEPARTMENTS=["경영기획","영업","마케팅","구매","인사","재무","기술개발","제품기획","디자인","법무","IR","CS","데이터","보안"];

const SURNAMES=["김","이","박","최","정","강","조","윤","장","임","한","오","서","신","권","황","안","송","류","홍"];
const GIVEN_NAMES=["영호","수진","민수","지혜","현우","은지","준혁","서연","도윤","하은","시우","지우","예준","서윤","하준","지민","건우","소율","유준","다은","승현","채원","태민","나윤","재현","서준","민서","예은","도현","수빈"];
const BIOS=["데이터 기반 의사결정을 추구합니다.","새로운 비즈니스 기회를 발굴합니다.","고객 중심 솔루션을 만듭니다.","효율적 프로세스를 설계합니다.","글로벌 시장 확장을 담당합니다.","기술로 혁신을 주도합니다.","파트너십으로 시너지를 창출합니다.","최적의 공급망을 구축합니다."];

const PURPOSE_OPTIONS=[
  {id:"SALES",label:"영업/세일즈",icon:"💼",color:"var(--orange)",bgColor:"var(--orange-bg)",rate:"20~40%"},
  {id:"PURCHASE",label:"구매/발주",icon:"🛒",color:"var(--blue)",bgColor:"var(--blue-bg)",rate:"80~95%"},
  {id:"COLLAB",label:"파트너십/협업",icon:"🤝",color:"var(--purple)",bgColor:"var(--purple-bg)",rate:"40~60%"},
  {id:"INVEST",label:"투자 관련",icon:"💰",color:"var(--pink)",bgColor:"var(--pink-bg)",rate:"60~80%"},
  {id:"RECRUIT",label:"채용",icon:"👤",color:"var(--gray-500)",bgColor:"var(--gray-50)",rate:"30~50%"},
];

const SIGNAL_CATEGORIES=["포장재","IT솔루션","원자재","물류","마케팅","디자인","법률자문","HR/채용","컨설팅","SaaS","제조","보안","데이터","기타"];

// ═══════ Utility Functions (지시서 5-2 약어 금지) ═══════
function generateSeedUsers(){
  const users=[];let idCounter=100;
  COMPANIES.forEach(company=>{
    const deptCount=3+Math.floor(Math.random()*3);
    const depts=[...DEPARTMENTS].sort(()=>Math.random()-.5).slice(0,deptCount);
    depts.forEach(dept=>{
      const count=1+Math.floor(Math.random()*2);
      for(let j=0;j<count;j++){
        const surname=SURNAMES[Math.floor(Math.random()*SURNAMES.length)];
        const givenName=GIVEN_NAMES[Math.floor(Math.random()*GIVEN_NAMES.length)];
        const position=POSITIONS[3+Math.floor(Math.random()*6)];
        users.push({
          id:'seed_'+(idCounter++),
          email:`user${idCounter}@example.com`,
          name:surname+givenName,
          company:company.name,
          companyLogo:company.logo,
          industry:company.industry,
          department:dept,
          position:position,
          phone:`010-${1000+Math.floor(Math.random()*9000)}-${1000+Math.floor(Math.random()*9000)}`,
          bio:`${company.name} ${dept} ${position}. ${BIOS[Math.floor(Math.random()*BIOS.length)]}`,
          isSearchable:true,
          plan:'FREE',
          isVerified:company.verified,
          joinedAt:new Date(Date.now()-Math.random()*120*86400000).toISOString(),
          lastActive:new Date(Date.now()-Math.random()*7*86400000).toISOString(),
          responseRate:60+Math.floor(Math.random()*35),
          isSeeded:true,
        });
      }
    });
  });
  return users;
}

function generateSeedSignals(users){
  const signalData=[
    {company:"쿠팡",dept:"구매",cat:"포장재",desc:"로켓배송용 친환경 포장재 대량 공급 가능한 업체. 월 50만개 이상 납품."},
    {company:"토스",dept:"기술개발",cat:"보안",desc:"금융 서비스 보안 점검 모의해킹 업체. ISMS 인증 보유 필수."},
    {company:"당근마켓",dept:"마케팅",cat:"마케팅",desc:"숏폼 바이럴 영상 제작 에이전시. 월 10편 이상 제작."},
    {company:"배달의민족",dept:"인사",cat:"HR/채용",desc:"중간관리자 리더십 교육 프로그램 운영 업체. 100명 규모."},
    {company:"네이버",dept:"구매",cat:"IT솔루션",desc:"AI 학습용 GPU 클러스터 호스팅 가능한 IDC/클라우드."},
  ];
  return signalData.map((sd,i)=>{
    const owner=users.find(u=>u.company===sd.company&&u.department===sd.dept)||users[i];
    return{id:'sig_seed_'+i,userId:owner?.id||users[0].id,category:sd.cat,description:sd.desc,isActive:true,createdAt:new Date(Date.now()-(i+1)*12*3600000).toISOString(),expiresAt:new Date(Date.now()+30*86400000).toISOString()};
  });
}

function formatTimeAgo(dateStr){
  const ms=Date.now()-new Date(dateStr).getTime();
  const minutes=Math.floor(ms/60000);
  if(minutes<1)return"방금 전";if(minutes<60)return`${minutes}분 전`;
  const hours=Math.floor(minutes/60);if(hours<24)return`${hours}시간 전`;
  const days=Math.floor(hours/24);
  if(days<7)return`${days}일 전`;if(days<30)return`${Math.floor(days/7)}주 전`;
  return new Date(dateStr).toLocaleDateString("ko-KR",{month:"short",day:"numeric"});
}

function maskPhoneNumber(phone){return phone?phone.replace(/(\d{3})-(\d{4})-(\d{4})/,"$1-••••-••••"):"010-••••-••••";}
function getPurposeById(id){return PURPOSE_OPTIONS.find(p=>p.id===id)||PURPOSE_OPTIONS[0];}

// 초성 검색 지원 (지시서 2-2)
const CHOSUNG=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function getChosung(str){return[...str].map(ch=>{const code=ch.charCodeAt(0)-44032;return code>=0&&code<11172?CHOSUNG[Math.floor(code/588)]:ch}).join('');}
function matchesChosung(text,query){
  if(!query)return false;
  const isChosungQuery=[...query].every(ch=>CHOSUNG.includes(ch)||/[ㄱ-ㅎ]/.test(ch));
  if(!isChosungQuery)return false;
  const textChosung=getChosung(text);
  return textChosung.includes(query);
}

  ArrowLeft:({size=20,...p})=><svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24" aria-hidden="true" {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,

  Filter:({size=18,...p})=><svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24" aria-hidden="true" {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
  LogOut:({size=20,...p})=><svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24" aria-hidden="true" {...p}><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
  Verified:({size=14,...p})=><svg width={size} height={size} viewBox="0 0 24 24" fill="var(--emerald)" aria-label="인증됨" {...p}><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>,
  Message:({size=18,...p})=><svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24" aria-hidden="true" {...p}><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>,
  Eye:({size=18,...p})=><svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" aria-hidden="true" {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
  EyeOff:({size=18,...p})=><svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" aria-hidden="true" {...p}><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><line x1="1" y1="1" x2="23" y2="23"/></svg>,
  Clock:({size=14,...p})=><svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" viewBox="0 0 24 24" aria-hidden="true" {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  Activity:({size=14,...p})=><svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" viewBox="0 0 24 24" aria-hidden="true" {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
  Folder:({size=16,...p})=><svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" viewBox="0 0 24 24" aria-hidden="true" {...p}><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>,
};

/* ═══════════════════════════════════════════════════════════
   SECTION: App Context & State Management
   ═══════════════════════════════════════════════════════════ */
const AppContext=createContext();

function AppProvider({children}){
  const[allUsers,setAllUsers]=useState([]);
  const[currentUser,setCurrentUser]=useState(null);
  const[requests,setRequests]=useState([]);
  const[contacts,setContacts]=useState([]);
  const[notifications,setNotifications]=useState([]);
  const[signals,setSignals]=useState([]);
  const[intros,setIntros]=useState([]);
  const[recentSearches,setRecentSearches]=useState([]);
  const[activePage,setActivePage]=useState("home");
  const[selectedUser,setSelectedUser]=useState(null);
  const[selectedRequest,setSelectedRequest]=useState(null);
  const[toastMessage,setToastMessage]=useState(null);
  const[isReady,setIsReady]=useState(false);

  // ═══════ Initialize ═══════
  useEffect(()=>{
    let users=loadFromStorage(STORAGE_KEYS.USERS,[]);
    if(!loadFromStorage(STORAGE_KEYS.INITIALIZED)){
      users=generateSeedUsers();
      const seedSigs=generateSeedSignals(users);
      saveToStorage(STORAGE_KEYS.USERS,users);
      saveToStorage(STORAGE_KEYS.SIGNALS,seedSigs);
      saveToStorage(STORAGE_KEYS.INITIALIZED,true);
      setSignals(seedSigs);
    }else{
      setSignals(loadFromStorage(STORAGE_KEYS.SIGNALS,[]));
    }
    setAllUsers(users);
    const saved=loadFromStorage(STORAGE_KEYS.CURRENT);
    if(saved)setCurrentUser(saved);
    setRequests(loadFromStorage(STORAGE_KEYS.REQUESTS,[]));
    setContacts(loadFromStorage(STORAGE_KEYS.CONTACTS,[]));
    setNotifications(loadFromStorage(STORAGE_KEYS.NOTIFICATIONS,[]));
    setIntros(loadFromStorage(STORAGE_KEYS.INTROS,[]));
    setRecentSearches(loadFromStorage(STORAGE_KEYS.RECENT_SEARCHES,[]));
    setIsReady(true);
  },[]);

  // ═══════ Persist Helpers ═══════
  const persistUsers=useCallback(v=>{setAllUsers(v);saveToStorage(STORAGE_KEYS.USERS,v)},[]);
  const persistCurrentUser=useCallback(v=>{setCurrentUser(v);if(v)saveToStorage(STORAGE_KEYS.CURRENT,v);else localStorage.removeItem(STORAGE_KEYS.CURRENT)},[]);
  const persistRequests=useCallback(v=>{setRequests(v);saveToStorage(STORAGE_KEYS.REQUESTS,v)},[]);
  const persistContacts=useCallback(v=>{setContacts(v);saveToStorage(STORAGE_KEYS.CONTACTS,v)},[]);
  const persistNotifications=useCallback(v=>{setNotifications(v);saveToStorage(STORAGE_KEYS.NOTIFICATIONS,v)},[]);
  const persistSignals=useCallback(v=>{setSignals(v);saveToStorage(STORAGE_KEYS.SIGNALS,v)},[]);
  const persistIntros=useCallback(v=>{setIntros(v);saveToStorage(STORAGE_KEYS.INTROS,v)},[]);

  const showToast=useCallback((message,type="success")=>{setToastMessage({message,type});setTimeout(()=>setToastMessage(null),3000)},[]);

  const addRecentSearch=useCallback((query)=>{
    const updated=[query,...recentSearches.filter(s=>s!==query)].slice(0,5);
    setRecentSearches(updated);saveToStorage(STORAGE_KEYS.RECENT_SEARCHES,updated);
  },[recentSearches]);

  // ═══════ Auth Actions ═══════
  const handleSignup=useCallback((data)=>{
    if(allUsers.find(u=>u.email===data.email)){showToast("이미 가입된 이메일입니다.","error");return false;}
    const newUser={...data,id:'user_'+Date.now(),plan:'FREE',isSearchable:true,isVerified:false,joinedAt:new Date().toISOString(),lastActive:new Date().toISOString(),responseRate:100};
    persistUsers([...allUsers,newUser]);persistCurrentUser(newUser);showToast("환영합니다! 🎉");setActivePage("home");return true;
  },[allUsers,persistUsers,persistCurrentUser,showToast]);

  const handleLogin=useCallback((email,password)=>{
    const user=allUsers.find(u=>u.email===email&&u.password===password);
    if(!user){showToast("이메일 또는 비밀번호를 확인해주세요.","error");return false;}
    persistCurrentUser(user);showToast(`${user.name}님, 환영합니다!`);setActivePage("home");return true;
  },[allUsers,persistCurrentUser,showToast]);

  const handleLogout=useCallback(()=>{persistCurrentUser(null);setActivePage("home");showToast("로그아웃 되었습니다.")},[persistCurrentUser,showToast]);

  // ═══════ Contact Request Actions ═══════
  const sendContactRequest=useCallback((targetId,purpose,message)=>{
    if(!currentUser)return;
    if(requests.find(r=>r.fromUserId===currentUser.id&&r.toUserId===targetId&&r.status==="PENDING")){showToast("이미 요청을 보냈어요.","error");return;}
    const purposeInfo=getPurposeById(purpose);
    const newRequest={id:'req_'+Date.now(),fromUserId:currentUser.id,toUserId:targetId,purpose,message,status:"PENDING",createdAt:new Date().toISOString()};
    const newNotification={id:'notif_'+Date.now(),userId:targetId,type:"REQUEST_RECEIVED",title:"연락처 요청",body:`${currentUser.name}(${currentUser.company} ${currentUser.department})님이 ${purposeInfo.label} 목적으로 연락처를 요청했어요.`,isRead:false,relatedId:newRequest.id,createdAt:new Date().toISOString()};
    persistRequests([...requests,newRequest]);
    persistNotifications([...notifications,newNotification]);
    showToast("요청을 보냈습니다!");setSelectedUser(null);setActivePage("home");
  },[currentUser,requests,notifications,persistRequests,persistNotifications,showToast]);

  const respondToRequest=useCallback((requestId,accept)=>{
    const request=requests.find(r=>r.id===requestId);if(!request)return;
    persistRequests(requests.map(r=>r.id===requestId?{...r,status:accept?"ACCEPTED":"REJECTED",respondedAt:new Date().toISOString()}:r));
    if(accept){
      persistContacts([...contacts,
        {id:'ct_'+Date.now()+'a',userId:currentUser.id,contactUserId:request.fromUserId,requestId,memo:"",isFavorite:false,createdAt:new Date().toISOString()},
        {id:'ct_'+Date.now()+'b',userId:request.fromUserId,contactUserId:currentUser.id,requestId,memo:"",isFavorite:false,createdAt:new Date().toISOString()},
      ]);
      persistNotifications([...notifications,{id:'notif_'+Date.now(),userId:request.fromUserId,type:"REQUEST_ACCEPTED",title:"요청 승인! 🎉",body:`${currentUser.name}님이 연락처 요청을 수락했어요!`,isRead:false,relatedId:requestId,createdAt:new Date().toISOString()}]);
      showToast("연락처가 교환되었습니다! 🤝");
    }else{
      persistNotifications([...notifications,{id:'notif_'+Date.now(),userId:request.fromUserId,type:"REQUEST_REJECTED",title:"요청 미연결",body:"이번에는 연결이 되지 않았어요.",isRead:false,relatedId:requestId,createdAt:new Date().toISOString()}]);
      showToast("요청을 거부했습니다.");
    }
    setSelectedRequest(null);
  },[currentUser,requests,contacts,notifications,persistRequests,persistContacts,persistNotifications,showToast]);

  // ═══════ Signal Actions (지시서 2-5) ═══════
  const addBuyingSignal=useCallback((category,description)=>{
    if(!currentUser)return;
    const newSignal={id:'sig_'+Date.now(),userId:currentUser.id,category,description,isActive:true,createdAt:new Date().toISOString(),expiresAt:new Date(Date.now()+30*86400000).toISOString()};
    persistSignals([newSignal,...signals]);
    // Notify relevant seed users
    const matches=allUsers.filter(u=>u.isSeeded&&u.id!==currentUser.id&&u.isSearchable).slice(0,3);
    const newNotifs=matches.map((u,i)=>({id:'notif_'+Date.now()+i,userId:u.id,type:"BUYING_SIGNAL",title:"🔥 새 구매 신호",body:`${currentUser.name}(${currentUser.company})님이 '${category}' 관련 업체를 찾고 있어요.`,isRead:false,relatedId:newSignal.id,createdAt:new Date().toISOString()}));
    persistNotifications([...notifications,...newNotifs]);
    showToast("구매 신호가 등록되었습니다! 🔥");
  },[currentUser,signals,allUsers,notifications,persistSignals,persistNotifications,showToast]);

  const removeBuyingSignal=useCallback((signalId)=>{persistSignals(signals.filter(s=>s.id!==signalId));showToast("신호를 삭제했습니다.")},[signals,persistSignals,showToast]);

  // ═══════ Intro Actions (지시서 2-6) ═══════
  const sendIntroRequest=useCallback((bridgeUserId,targetUserId,message)=>{
    if(!currentUser)return;
    if(intros.find(i=>i.fromUserId===currentUser.id&&i.bridgeUserId===bridgeUserId&&i.targetUserId===targetUserId&&i.status==="PENDING")){showToast("이미 소개를 요청했어요.","error");return;}
    const newIntro={id:'intro_'+Date.now(),fromUserId:currentUser.id,bridgeUserId,targetUserId,message,status:"PENDING",createdAt:new Date().toISOString()};
    const targetUser=getUserById(targetUserId);
    persistIntros([...intros,newIntro]);
    persistNotifications([...notifications,{id:'notif_'+Date.now(),userId:bridgeUserId,type:"INTRO_REQUEST",title:"🤝 소개 요청",body:`${currentUser.name}님이 ${targetUser?.name}님에 대한 소개를 요청했어요.`,isRead:false,relatedId:newIntro.id,createdAt:new Date().toISOString()}]);
    showToast("소개 요청을 보냈습니다!");
  },[currentUser,intros,notifications,persistIntros,persistNotifications,showToast]);

  const respondToIntro=useCallback((introId,accept)=>{
    const intro=intros.find(i=>i.id===introId);if(!intro)return;
    persistIntros(intros.map(i=>i.id===introId?{...i,status:accept?"ACCEPTED":"REJECTED"}:i));
    const requester=getUserById(intro.fromUserId);const target=getUserById(intro.targetUserId);
    if(accept){
      const warmRequest={id:'req_'+Date.now(),fromUserId:intro.fromUserId,toUserId:intro.targetUserId,purpose:"COLLAB",message:`[${currentUser.name}님 소개] ${intro.message}`,status:"PENDING",createdAt:new Date().toISOString(),isIntro:true};
      persistRequests([...requests,warmRequest]);
      persistNotifications([...notifications,
        {id:'notif_'+Date.now()+'a',userId:intro.fromUserId,type:"INTRO_ACCEPTED",title:"소개 승인!",body:`${currentUser.name}님이 ${target?.name}님 소개를 수락했어요! 🎉`,isRead:false,relatedId:introId,createdAt:new Date().toISOString()},
        {id:'notif_'+Date.now()+'b',userId:intro.targetUserId,type:"REQUEST_RECEIVED",title:"🤝 소개 연락",body:`${requester?.name}님이 ${currentUser.name}님의 소개로 연락처를 요청했어요.`,isRead:false,relatedId:warmRequest.id,createdAt:new Date().toISOString()},
      ]);showToast("소개를 승인했습니다! 🤝");
    }else{
      persistNotifications([...notifications,{id:'notif_'+Date.now(),userId:intro.fromUserId,type:"INTRO_REJECTED",title:"소개 미성사",body:"이번 소개는 성사되지 않았어요.",isRead:false,relatedId:introId,createdAt:new Date().toISOString()}]);
      showToast("소개 요청을 거절했습니다.");
    }
  },[currentUser,intros,requests,notifications,persistIntros,persistRequests,persistNotifications,showToast]);

  // ═══════ Profile Update with Change Notification (지시서 2-4) ═══════
  const updateUserProfile=useCallback((newData)=>{
    if(!currentUser)return;
    const changes=[];
    if(newData.company&&newData.company!==currentUser.company)changes.push(`회사: ${currentUser.company} → ${newData.company}`);
    if(newData.department&&newData.department!==currentUser.department)changes.push(`부서: ${currentUser.department} → ${newData.department}`);
    if(newData.position&&newData.position!==currentUser.position)changes.push(`직책: ${currentUser.position} → ${newData.position}`);
    const updated={...currentUser,...newData,lastActive:new Date().toISOString()};
    const updatedUsers=allUsers.map(u=>u.id===currentUser.id?updated:u);
    saveToStorage(STORAGE_KEYS.USERS,updatedUsers);persistUsers(updatedUsers);persistCurrentUser(updated);
    if(changes.length>0){
      const myContacts=contacts.filter(c=>c.userId===currentUser.id);
      const changeNotifs=myContacts.map((c,i)=>({id:'notif_'+Date.now()+i,userId:c.contactUserId,type:"CONTACT_CHANGED",title:"⚡ 담당자 정보 변경",body:`${currentUser.name}님의 정보가 변경되었어요: ${changes.join(", ")}`,isRead:false,relatedId:currentUser.id,createdAt:new Date().toISOString()}));
      persistNotifications([...notifications,...changeNotifs]);
      showToast("프로필이 업데이트되었습니다! 변경 알림이 전송되었어요.");
    }else{showToast("프로필이 업데이트되었습니다!");}
  },[currentUser,allUsers,contacts,notifications,persistUsers,persistCurrentUser,persistNotifications,showToast]);

  // ═══════ Helper ═══════
  const getUserById=useCallback(id=>allUsers.find(u=>u.id===id),[allUsers]);

  // ═══════ Derived Data ═══════
  const myReceivedRequests=useMemo(()=>currentUser?requests.filter(r=>r.toUserId===currentUser.id):[],[currentUser,requests]);
  const mySentRequests=useMemo(()=>currentUser?requests.filter(r=>r.fromUserId===currentUser.id):[],[currentUser,requests]);
  const myContacts=useMemo(()=>currentUser?contacts.filter(c=>c.userId===currentUser.id):[],[currentUser,contacts]);
  const myNotifications=useMemo(()=>currentUser?notifications.filter(n=>n.userId===currentUser.id).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)):[],[currentUser,notifications]);
  const unreadNotifCount=useMemo(()=>myNotifications.filter(n=>!n.isRead).length,[myNotifications]);
  const pendingInboxCount=useMemo(()=>myReceivedRequests.filter(r=>r.status==="PENDING").length,[myReceivedRequests]);

  const contextValue=useMemo(()=>({
    allUsers,currentUser,requests,contacts,notifications,signals,intros,recentSearches,
    activePage,selectedUser,selectedRequest,toastMessage,isReady,
    myReceivedRequests,mySentRequests,myContacts,myNotifications,unreadNotifCount,pendingInboxCount,
    setActivePage,setSelectedUser,setSelectedRequest,
    persistUsers,persistCurrentUser,persistNotifications,persistContacts,persistRequests,
    showToast,addRecentSearch,handleSignup,handleLogin,handleLogout,
    sendContactRequest,respondToRequest,
    addBuyingSignal,removeBuyingSignal,
    sendIntroRequest,respondToIntro,
    updateUserProfile,getUserById,
  }),[allUsers,currentUser,requests,contacts,notifications,signals,intros,recentSearches,activePage,selectedUser,selectedRequest,toastMessage,isReady,myReceivedRequests,mySentRequests,myContacts,myNotifications,unreadNotifCount,pendingInboxCount]);

  return <AppContext.Provider value={contextValue}>{children}</AppContext.Provider>;
}

const useApp=()=>useContext(AppContext);

/* ═══════════════════════════════════════════════════════════
   SECTION: Common UI Components
   ═══════════════════════════════════════════════════════════ */

// Toast notification (지시서 1-5 성공/실패 애니메이션)
function ToastNotification(){
  const{toastMessage}=useApp();if(!toastMessage)return null;
  return <div role="alert" aria-live="polite" style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:9999,background:toastMessage.type==="error"?"var(--red)":"var(--emerald)",color:"#fff",padding:"13px 24px",borderRadius:"var(--radius)",fontSize:14,fontWeight:700,boxShadow:"var(--shadow-lg)",animation:"slideDown .2s ease",maxWidth:360,textAlign:"center"}}>{toastMessage.message}</div>;
}

// Avatar component
function Avatar({name,logo,size=44,style:extraStyle}){
  return <div aria-hidden="true" style={{width:size,height:size,borderRadius:size*.3,flexShrink:0,background:"linear-gradient(135deg,rgba(52,211,153,.12),rgba(167,139,250,.1))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.42,color:"var(--navy)",...extraStyle}}>{logo||name?.[0]||"?"}</div>;
}

// Purpose badge
function PurposeBadge({purposeId,isSmall}){
  const purpose=getPurposeById(purposeId);
  return <span className="badge" style={{background:purpose.bgColor,color:purpose.color,fontSize:isSmall?10:12,padding:isSmall?"2px 7px":"4px 10px"}}>{purpose.icon} {purpose.label}</span>;
}

// Back button (지시서 3-2 뒤로가기 항상 표시)
function BackButton({onClick,label="뒤로"}){
  return <button onClick={onClick} aria-label="뒤로가기" style={{background:"none",border:"none",color:"var(--gray-500)",cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontSize:14,padding:"8px 0",marginBottom:12,fontFamily:"var(--font)",minHeight:44}}><Icon.ArrowLeft size={18}/> {label}</button>;
}

// Empty state (지시서 1-4 빈 상태)
function EmptyState({icon,title,description,actionLabel,onAction}){
  return <div className="fi" role="status" style={{textAlign:"center",padding:"48px 20px"}}><div style={{fontSize:48,marginBottom:12}}>{icon}</div><div style={{fontSize:16,fontWeight:700,color:"var(--navy)",marginBottom:8}}>{title}</div><div style={{fontSize:14,color:"var(--gray-500)",lineHeight:1.6,marginBottom:onAction?20:0}}>{description}</div>{onAction&&<button className="btn-primary" onClick={onAction}>{actionLabel}</button>}</div>;
}

// Skeleton card (지시서 1-5 스켈레톤 UI)
function SkeletonCard(){
  return <div style={{background:"var(--white)",borderRadius:"var(--radius)",padding:20,boxShadow:"var(--shadow-sm)",display:"flex",alignItems:"center",gap:14}}>
    <div className="skel" style={{width:46,height:46,borderRadius:14}}/>
    <div style={{flex:1}}><div className="skel" style={{height:14,width:"60%",marginBottom:8}}/><div className="skel" style={{height:12,width:"80%",marginBottom:6}}/><div className="skel" style={{height:10,width:"40%"}}/></div>
  </div>;
}

// User card (지시서 2-2 검색 결과 카드 핵심 정보 3줄)
function UserCard({user,onClick}){
  return <div className="card fi" onClick={onClick} role="button" tabIndex={0} aria-label={`${user.name}, ${user.company} ${user.department} ${user.position}`}
    onKeyDown={e=>{if(e.key==="Enter")onClick?.()}}
    style={{display:"flex",alignItems:"center",gap:14,cursor:"pointer",padding:16}}>
    <Avatar name={user.name} logo={user.companyLogo} size={46}/>
    <div style={{flex:1,minWidth:0}}>
      <div style={{display:"flex",alignItems:"center",gap:5}}>
        <span style={{fontWeight:700,fontSize:15}}>{user.name}</span>
        {user.isVerified&&<Icon.Verified size={13}/>}
        <span style={{fontSize:13,color:"var(--gray-500)"}}>{user.position}</span>
      </div>
      <div style={{fontSize:13,color:"var(--gray-500)",marginTop:3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{user.company} · {user.department}</div>

  const[results,setResults]=useState([]);
  const[hasSearched,setHasSearched]=useState(false);
  const[industryFilter,setIndustryFilter]=useState("");
  const[showFilters,setShowFilters]=useState(false);
  const[showSuggestions,setShowSuggestions]=useState(false);
  const inputRef=useRef(null);

  const industries=useMemo(()=>[...new Set(allUsers.map(u=>u.industry).filter(Boolean))],[allUsers]);
  // Company directory for grid (지시서 2-2)
  const companyDirectory=useMemo(()=>{
    const map={};
    allUsers.filter(u=>u.isSeeded&&u.isSearchable).forEach(u=>{
      if(!map[u.company])map[u.company]={name:u.company,logo:u.companyLogo,industry:u.industry,count:0,verified:u.isVerified};
      map[u.company].count++;
    });
    return Object.values(map).sort((a,b)=>b.count-a.count);
  },[allUsers]);

  // Search with chosung support (지시서 2-2)
  const performSearch=(searchQuery)=>{
    const term=(searchQuery||query).trim();
    if(!term){setHasSearched(false);setResults([]);return;}
    const lower=term.toLowerCase();
    setHasSearched(true);
    addRecentSearch(term);
    const filtered=allUsers.filter(u=>{
      if(u.id===currentUser?.id||!u.isSearchable)return false;
      if(industryFilter&&u.industry!==industryFilter)return false;
      // Regular text match
      const textMatch=u.name.includes(lower)||u.company.toLowerCase().includes(lower)||u.department.includes(lower)||u.position.includes(lower)||(u.industry&&u.industry.toLowerCase().includes(lower));
      // Chosung match (ㅅㅈ → 삼성전자)
      const chosungMatch=matchesChosung(u.company,term)||matchesChosung(u.name,term);
      return textMatch||chosungMatch;
    });
    setResults(filtered);
    setShowSuggestions(false);
  };

  // Group results by Company > Department (지시서 2-2)
  const groupedResults=useMemo(()=>{
    const map={};
    results.forEach(u=>{
      if(!map[u.company])map[u.company]={name:u.company,logo:u.companyLogo,industry:u.industry,departments:{}};
      if(!map[u.company].departments[u.department])map[u.company].departments[u.department]=[];
      map[u.company].departments[u.department].push(u);
    });
    return Object.values(map);
  },[results]);

  // Autocomplete suggestions (지시서 2-2)
  const suggestions=useMemo(()=>{
    if(!query.trim()||query.length<1)return[];
    const lower=query.toLowerCase();
    const companyMatches=companyDirectory.filter(c=>c.name.toLowerCase().includes(lower)||matchesChosung(c.name,query)).slice(0,4);
    return companyMatches;
  },[query,companyDirectory]);

  return <main style={{padding:"0 20px",paddingTop:20}} role="main">
    {/* Header */}
    <header className="fi" style={{textAlign:"center",marginBottom:24}}>
      <p style={{fontSize:13,color:"var(--gray-400)",marginBottom:6}}>동의 기반 비즈니스 연락처</p>
      <h1 style={{fontSize:24,fontWeight:900,letterSpacing:-.8}}>어떤 회사든 <span style={{color:"var(--emerald)"}}>검색</span>하세요</h1>
      <p style={{fontSize:13,color:"var(--gray-400)",marginTop:6}}>등록된 <strong style={{color:"var(--gray-600)"}}>{allUsers.filter(u=>u.isSeeded).length}명</strong>의 담당자</p>
    </header>

    {/* Search Bar */}
    <div className="fi1" style={{display:"flex",gap:8,marginBottom:16,position:"relative"}}>
      <div style={{flex:1,display:"flex",alignItems:"center",gap:10,background:"var(--white)",borderRadius:"var(--radius)",padding:"13px 16px",border:"1.5px solid var(--gray-200)",transition:"border-color .15s",boxShadow:"var(--shadow-sm)"}} onFocus={()=>setShowSuggestions(true)}>
        <Icon.Search size={18} style={{color:"var(--gray-400)",flexShrink:0}}/>
        <input ref={inputRef} value={query} onChange={e=>{setQuery(e.target.value);setShowSuggestions(true)}} onKeyDown={e=>{if(e.key==="Enter"){performSearch();setShowSuggestions(false);}}}
          onFocus={()=>setShowSuggestions(true)}
          placeholder="회사명, 부서, 이름 (초성 ㅅㅈ 가능)" aria-label="담당자 검색"
          style={{background:"none",border:"none",color:"var(--navy)",fontSize:15,outline:"none",flex:1,fontFamily:"var(--font)"}}/>
        {query&&<button onClick={()=>{setQuery("");setHasSearched(false);setResults([]);setShowSuggestions(false)}} aria-label="검색어 지우기" style={{background:"none",border:"none",color:"var(--gray-400)",cursor:"pointer",padding:4,minWidth:32,minHeight:32,display:"flex",alignItems:"center",justifyContent:"center"}}><Icon.Close size={16}/></button>}
      </div>
      <button onClick={()=>setShowFilters(!showFilters)} aria-label="검색 필터" style={{background:showFilters?"var(--emerald-bg)":"var(--white)",border:"1.5px solid "+(showFilters?"var(--emerald-border)":"var(--gray-200)"),borderRadius:"var(--radius)",width:48,minHeight:48,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:showFilters?"var(--emerald)":"var(--gray-400)"}}><Icon.Filter/></button>

      {/* Suggestions Dropdown (지시서 2-2 자동완성 + 최근 검색) */}
      {showSuggestions&&!hasSearched&&<div style={{position:"absolute",top:"100%",left:0,right:56,marginTop:4,background:"var(--white)",borderRadius:"var(--radius)",boxShadow:"var(--shadow-lg)",zIndex:50,overflow:"hidden",border:"1px solid var(--gray-200)"}}>
        {suggestions.length>0&&<div style={{padding:"8px 0"}}>{suggestions.map(c=><button key={c.name} onClick={()=>{setQuery(c.name);performSearch(c.name);setShowSuggestions(false);}} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"10px 16px",border:"none",background:"none",cursor:"pointer",fontFamily:"var(--font)",textAlign:"left",minHeight:44}} onMouseEnter={e=>{e.currentTarget.style.background="var(--gray-50)"}} onMouseLeave={e=>{e.currentTarget.style.background="none"}}>
          <span style={{fontSize:16}}>{c.logo}</span><span style={{fontWeight:600,fontSize:14}}>{c.name}</span><span style={{fontSize:12,color:"var(--gray-400)",marginLeft:"auto"}}>{c.count}명</span>
        </button>)}</div>}
        {!query&&recentSearches.length>0&&<div style={{padding:"8px 0"}}><div style={{padding:"4px 16px 8px",fontSize:11,fontWeight:700,color:"var(--gray-400)"}}>최근 검색</div>{recentSearches.map(s=><button key={s} onClick={()=>{setQuery(s);performSearch(s);setShowSuggestions(false);}} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"10px 16px",border:"none",background:"none",cursor:"pointer",fontFamily:"var(--font)",textAlign:"left",fontSize:14,color:"var(--gray-600)",minHeight:44}}>
          <Icon.Clock size={14} style={{color:"var(--gray-400)"}}/>{s}
        </button>)}</div>}
        {!query&&recentSearches.length===0&&suggestions.length===0&&null}
      </div>}
    </div>

    {/* Industry Filters */}
    {showFilters&&<div className="fi" style={{marginBottom:14}}><div style={{fontSize:12,fontWeight:700,color:"var(--gray-500)",marginBottom:8}}>산업 필터</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}><button onClick={()=>setIndustryFilter("")} className={!industryFilter?"btn-primary":"btn-secondary"} style={{padding:"6px 14px",fontSize:12,minHeight:36}}>전체</button>{industries.map(ind=><button key={ind} onClick={()=>setIndustryFilter(ind===industryFilter?"":ind)} className={industryFilter===ind?"btn-primary":"btn-secondary"} style={{padding:"6px 14px",fontSize:12,minHeight:36}}>{ind}</button>)}</div></div>}

    {/* Before search: Company Directory Grid */}
    {!hasSearched&&<section aria-label="등록 기업 디렉토리">
      <div className="fi2" style={{marginBottom:24}}>
        <h2 style={{fontSize:12,fontWeight:700,color:"var(--gray-400)",letterSpacing:1,marginBottom:12}}>등록 기업 디렉토리</h2>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {companyDirectory.map(company=><button key={company.name} onClick={()=>{setQuery(company.name);performSearch(company.name);setShowSuggestions(false);}}
            className="card-sm" style={{textAlign:"left",cursor:"pointer",padding:14,border:"none",width:"100%",fontFamily:"var(--font)"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <span style={{fontSize:18}}>{company.logo}</span>
              <span style={{fontWeight:700,fontSize:14,flex:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{company.name}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:11,color:"var(--gray-400)"}}>{company.industry}</span>
              <span style={{fontSize:12,color:"var(--emerald)",fontWeight:700}}>{company.count}명</span>
            </div>
          </button>)}
        </div>
      </div>
      <div className="fi3 card-sm" style={{textAlign:"center",padding:16}}>
        <p style={{fontSize:13,color:"var(--gray-500)"}}>💡 회사명을 검색하면 <strong style={{color:"var(--navy)"}}>부서별 담당자</strong>를 한눈에 볼 수 있어요</p>
      </div>
    </section>}

    {/* Search Results: Grouped by Company > Department */}
    {hasSearched&&<section aria-label="검색 결과">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h2 style={{fontSize:16,fontWeight:800}}>검색 결과 <span style={{color:"var(--emerald)"}}>{results.length}명</span></h2>
        <button onClick={()=>{setHasSearched(false);setQuery("");setResults([]);setIndustryFilter("")}} style={{background:"none",border:"none",color:"var(--gray-500)",cursor:"pointer",fontSize:13,fontFamily:"var(--font)",minHeight:44}}>초기화</button>
      </div>
      {results.length===0?<EmptyState icon="🔍" title="검색 결과가 없어요" description="다른 회사명이나 부서, 직책으로 검색해보세요. 초성 검색(ㅅㅈ)도 가능합니다." actionLabel="기업 디렉토리 보기" onAction={()=>{setHasSearched(false);setQuery("")}}/>
      :<div style={{display:"flex",flexDirection:"column",gap:16}}>
        {groupedResults.map(company=><article key={company.name} className="fi">
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <span style={{fontSize:18}}>{company.logo}</span>
            <h3 style={{fontWeight:800,fontSize:16}}>{company.name}</h3>
            <span style={{fontSize:11,color:"var(--gray-400)"}}>{company.industry}</span>
          </div>
          {Object.entries(company.departments).map(([deptName,users])=><div key={deptName} style={{marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:4,fontSize:12,fontWeight:700,color:"var(--emerald)",marginBottom:6,paddingLeft:4}}>
              <Icon.Folder size={14}/> {deptName}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {users.map(user=><UserCard key={user.id} user={user} onClick={()=>{setSelectedUser(user);setActivePage("profile");}}/>)}
            </div>
          </div>)}
        </article>)}
      </div>}
    </section>}
  </main>;
}

/* ═══════════════════════════════════════════════════════════
   SECTION: Profile Detail (지시서 2-3 신뢰 지표 + 2-6 소개 체인)
   ═══════════════════════════════════════════════════════════ */
function ProfilePage(){
  const{currentUser,selectedUser,setSelectedUser,setActivePage,sendContactRequest,requests,myContacts,showToast,contacts,getUserById,sendIntroRequest,signals}=useApp();
  const[showRequestModal,setShowRequestModal]=useState(false);
  const[purpose,setPurpose]=useState("");const[message,setMessage]=useState("");
  const[introTarget,setIntroTarget]=useState(null);const[introMessage,setIntroMessage]=useState("");

  const user=selectedUser;if(!user)return null;
  const isConnected=myContacts.some(c=>c.contactUserId===user.id);
  const isPending=requests.some(r=>r.fromUserId===currentUser.id&&r.toUserId===user.id&&r.status==="PENDING");
  const isSelf=user.id===currentUser.id;
  // 2촌 연결 (소개 가능)
  const secondDegreeContacts=isConnected?contacts.filter(c=>c.userId===user.id).map(c=>getUserById(c.contactUserId)).filter(x=>x&&x.id!==currentUser.id&&!myContacts.some(mc=>mc.contactUserId===x.id)):[];
  const userSignals=signals.filter(s=>s.userId===user.id&&s.isActive);
  // 공통점 표시 (지시서 2-3)
  const commonPoints=[];
  if(user.industry===currentUser.industry)commonPoints.push("같은 업종");
  const mutualCount=myContacts.filter(mc=>{return contacts.some(c=>c.userId===user.id&&c.contactUserId===mc.contactUserId)}).length;
  if(mutualCount>0)commonPoints.push(`공통 연결 ${mutualCount}명`);

  return <main style={{padding:"0 20px",paddingTop:16}}>
    <BackButton onClick={()=>{setSelectedUser(null);setActivePage("home");}}/>

    {/* Profile Card */}
    <article className="card fi" style={{textAlign:"center",padding:28}}>
      <Avatar name={user.name} logo={user.companyLogo} size={72} style={{margin:"0 auto 16px",border:"3px solid var(--emerald-border)"}}/>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
        <h2 style={{fontSize:22,fontWeight:900}}>{user.name}</h2>
        {user.isVerified&&<Icon.Verified size={16}/>}
      </div>
      <p style={{fontSize:14,color:"var(--gray-500)",marginTop:4}}>{user.position}</p>
      <p style={{fontSize:14,color:"var(--gray-500)",marginTop:2}}>{user.company} · {user.department}</p>
      {user.industry&&<span className="badge" style={{background:"var(--emerald-bg)",color:"var(--emerald)",marginTop:10}}>🏢 {user.industry}</span>}

      {/* 신뢰 지표 (지시서 2-3) */}
      <div style={{display:"flex",justifyContent:"center",gap:16,marginTop:16,padding:"12px 0",borderTop:"1px solid var(--gray-100)",borderBottom:"1px solid var(--gray-100)"}}>
        <div style={{textAlign:"center"}}><div style={{fontSize:11,color:"var(--gray-400)"}}>가입일</div><div style={{fontSize:13,fontWeight:700,marginTop:2}}>{new Date(user.joinedAt).toLocaleDateString("ko-KR",{year:"2-digit",month:"short"})}</div></div>
        <div style={{textAlign:"center"}}><div style={{fontSize:11,color:"var(--gray-400)"}}>응답률</div><div style={{fontSize:13,fontWeight:700,marginTop:2,color:"var(--emerald)"}}>{user.responseRate||80}%</div></div>
        <div style={{textAlign:"center"}}><div style={{fontSize:11,color:"var(--gray-400)"}}>최근 활동</div><div style={{fontSize:13,fontWeight:700,marginTop:2}}>{formatTimeAgo(user.lastActive||user.joinedAt)}</div></div>
      </div>

      {/* 공통점 (지시서 2-3) */}
      {commonPoints.length>0&&<div style={{display:"flex",justifyContent:"center",gap:6,marginTop:12,flexWrap:"wrap"}}>{commonPoints.map(cp=><span key={cp} className="badge" style={{background:"var(--blue-bg)",color:"var(--blue)"}}>{cp}</span>)}</div>}

      {user.bio&&<p style={{fontSize:13,color:"var(--gray-500)",marginTop:14,lineHeight:1.7}}>{user.bio}</p>}

      {/* Phone display */}
      <div style={{marginTop:18,padding:"14px 18px",borderRadius:"var(--radius)",background:isConnected?"var(--emerald-bg)":"var(--gray-50)",border:"1px solid "+(isConnected?"var(--emerald-border)":"var(--gray-200)")}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <Icon.Phone size={18} style={{color:isConnected?"var(--emerald)":"var(--gray-400)"}}/>
          <span style={{fontSize:17,fontWeight:800,letterSpacing:1,color:isConnected?"var(--navy)":"var(--gray-400)"}}>{isConnected?user.phone:maskPhoneNumber(user.phone)}</span>
        </div>
        {isConnected&&<div style={{fontSize:11,color:"var(--emerald)",marginTop:6,fontWeight:700}}>✅ 연결됨 — 연락처 공개</div>}
        {!isConnected&&!isSelf&&<div style={{fontSize:11,color:"var(--gray-400)",marginTop:6}}>🔒 상대방 수락 시 공개</div>}
      </div>
    </article>

    {/* Action Buttons */}
    {!isSelf&&!isConnected&&!isPending&&<button className="btn-primary fi1" onClick={()=>setShowRequestModal(true)} style={{width:"100%",marginTop:16,fontSize:16}}><Icon.Send size={18}/> 연락처 요청하기</button>}
    {isPending&&<div className="fi1" style={{marginTop:16,textAlign:"center",padding:16,borderRadius:"var(--radius)",background:"var(--orange-bg)",color:"var(--orange)",fontWeight:700,fontSize:14}}>⏳ 응답 대기 중</div>}
    {isConnected&&<div className="fi1" style={{display:"flex",gap:10,marginTop:16}}>
      <a href={"tel:"+user.phone?.replace(/-/g,"")} className="btn-primary" style={{flex:1,fontSize:14,textDecoration:"none"}}><Icon.Phone size={16}/> 전화</a>
      <a href={"sms:"+user.phone?.replace(/-/g,"")} className="btn-secondary" style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,fontSize:14,textDecoration:"none"}}><Icon.Message size={16}/> 메시지</a>
    </div>}

    {/* 구매 신호 표시 */}
    {userSignals.length>0&&<section className="fi2" style={{marginTop:20}}>
      <h3 style={{fontSize:12,fontWeight:700,color:"var(--orange)",marginBottom:10}}>🔥 지금 찾고 있어요</h3>
      {userSignals.map(sig=><div key={sig.id} className="card-sm" style={{marginBottom:8,borderLeft:"3px solid var(--orange)"}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--orange)"}}>{sig.category}</div>
        <div style={{fontSize:12,color:"var(--gray-500)",marginTop:4,lineHeight:1.5}}>{sig.description}</div>
        <div style={{fontSize:10,color:"var(--gray-400)",marginTop:6}}>{formatTimeAgo(sig.createdAt)}</div>
      </div>)}
    </section>}

    {/* 소개 체인 — 2촌 연결 (지시서 2-6) */}
    {isConnected&&secondDegreeContacts.length>0&&<section className="fi2" style={{marginTop:20}}>
      <h3 style={{fontSize:12,fontWeight:700,color:"var(--purple)",marginBottom:10}}>🤝 {user.name}님을 통해 소개 가능</h3>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {secondDegreeContacts.slice(0,5).map(contact=><div key={contact.id} className="card-sm" style={{display:"flex",alignItems:"center",gap:12}}>
          <Avatar name={contact.name} logo={contact.companyLogo} size={40}/>
          <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:14}}>{contact.name}</div><div style={{fontSize:12,color:"var(--gray-500)"}}>{contact.company} · {contact.department}</div></div>
          <button onClick={()=>{setIntroTarget(contact);setIntroMessage("")}} className="btn-secondary" style={{padding:"8px 12px",fontSize:11,fontWeight:700,minHeight:36,color:"var(--purple)"}}>소개 요청</button>
        </div>)}
      </div>
      <p style={{fontSize:11,color:"var(--gray-400)",marginTop:8}}>💡 소개를 통하면 수락률이 2~3배 높아져요</p>
    </section>}

    {/* Request Modal */}
    {showRequestModal&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",backdropFilter:"blur(8px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setShowRequestModal(false)}>
      <div role="dialog" aria-label="연락처 요청" onClick={e=>e.stopPropagation()} style={{background:"var(--bg2)",borderRadius:"var(--radius-xl) var(--radius-xl) 0 0",padding:"24px 20px 36px",width:"100%",maxWidth:480,maxHeight:"85vh",overflowY:"auto",animation:"slideUp .25s ease"}}>
        <div style={{width:40,height:4,borderRadius:2,background:"var(--gray-200)",margin:"0 auto 22px"}}/>
        <h3 style={{fontFamily:"var(--font-display)",fontSize:20,fontWeight:900,margin:"0 0 4px"}}>연락처 요청</h3>
        <p style={{fontSize:13,color:"var(--gray-500)",margin:"0 0 22px"}}>{user.name}님({user.company})에게 명함을 전달합니다</p>

        <h4 style={{fontSize:13,fontWeight:700,marginBottom:10}}>요청 목적 *</h4>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>
          {PURPOSE_OPTIONS.map(p=><button key={p.id} onClick={()=>setPurpose(p.id)} style={{background:purpose===p.id?p.bgColor:"var(--gray-50)",color:purpose===p.id?p.color:"var(--gray-500)",border:"1.5px solid "+(purpose===p.id?"transparent":"var(--gray-200)"),borderRadius:"var(--radius-sm)",padding:"10px 14px",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontFamily:"var(--font)",minHeight:44,transition:"all .15s"}}>{p.icon} {p.label}</button>)}
        </div>

        <h4 style={{fontSize:13,fontWeight:700,marginBottom:10}}>한줄 메시지 <span style={{fontWeight:400,color:"var(--gray-400)"}}>선택</span></h4>
        <textarea className="input-field" value={message} onChange={e=>setMessage(e.target.value.slice(0,100))} placeholder={`안녕하세요, ${currentUser.company} ${currentUser.department}의 ${currentUser.name}입니다.`} style={{height:80,resize:"none",marginBottom:4}} aria-label="요청 메시지"/>
        <div style={{fontSize:11,color:"var(--gray-400)",textAlign:"right",marginBottom:18}}>{message.length}/100</div>

        {/* Preview (지시서 2-3) */}
        <div className="card-sm" style={{marginBottom:22,border:"1px solid var(--gray-200)"}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--gray-400)",marginBottom:10}}>📱 상대방에게 이렇게 보여요</div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><Avatar name={currentUser.name} logo={currentUser.companyLogo} size={36}/><div><div style={{fontSize:14,fontWeight:700}}>{currentUser.name}</div><div style={{fontSize:12,color:"var(--gray-500)"}}>{currentUser.company} {currentUser.department}</div></div></div>
          {purpose&&<PurposeBadge purposeId={purpose}/>}
          {message&&<div style={{fontSize:13,marginTop:8,fontStyle:"italic",color:"var(--gray-600)"}}>"{message}"</div>}
        </div>

      </div>
    </div>}
  </main>;

/* ═══════════════════════════════════════════════════════════
   SECTION: Inbox (지시서 2-4 연락처 관리, 2-8 알림)
   ═══════════════════════════════════════════════════════════ */
function InboxPage(){
  const{currentUser,myReceivedRequests,mySentRequests,getUserById,setSelectedUser,setActivePage,setSelectedRequest,selectedRequest,respondToRequest}=useApp();
  const[tab,setTab]=useState("received");
  const pendingReceived=myReceivedRequests.filter(r=>r.status==="PENDING");
  const processedReceived=myReceivedRequests.filter(r=>r.status!=="PENDING");
  const items=tab==="received"?[...pendingReceived,...processedReceived]:mySentRequests.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));

  const RequestCard=({request,isSent})=>{
    const otherUser=getUserById(isSent?request.toUserId:request.fromUserId);if(!otherUser)return null;
    const isPending=request.status==="PENDING";
    return <div className="card fi" onClick={()=>{if(!isSent&&isPending)setSelectedRequest(request);else{setSelectedUser(otherUser);setActivePage("profile");}}} role="button" tabIndex={0} aria-label={`${otherUser.name}님의 연락처 요청`}
      style={{marginBottom:8,cursor:"pointer",padding:16,borderLeft:isPending?"3px solid var(--emerald)":"none"}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <Avatar name={otherUser.name} logo={otherUser.companyLogo} size={44}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:3}}>
            <span style={{fontWeight:700,fontSize:14}}>{otherUser.name}</span>
            <PurposeBadge purposeId={request.purpose} isSmall/>
            {request.isIntro&&<span className="badge" style={{background:"var(--purple-bg)",color:"var(--purple)"}}>소개</span>}
          </div>
          <div style={{fontSize:12,color:"var(--gray-500)"}}>{otherUser.company} · {otherUser.department}</div>
          {request.message&&<div style={{fontSize:12,color:"var(--gray-400)",marginTop:3,fontStyle:"italic",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>"{request.message}"</div>}
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <span className="badge" style={{background:isPending?"var(--orange-bg)":request.status==="ACCEPTED"?"var(--emerald-bg)":"var(--red-bg)",color:isPending?"var(--orange)":request.status==="ACCEPTED"?"var(--emerald)":"var(--red)"}}>{isPending?"대기중":request.status==="ACCEPTED"?"승인":"거부"}</span>
          <div style={{fontSize:10,color:"var(--gray-400)",marginTop:4}}>{formatTimeAgo(request.createdAt)}</div>
        </div>
      </div>
    </div>;
  };

  return <main style={{padding:"0 20px",paddingTop:16}}>
    <h2 className="fi" style={{fontFamily:"var(--font-display)",fontSize:22,fontWeight:900,margin:"0 0 20px"}}>{tab==="received"?"📨 수신함":"📤 보낸 요청"}</h2>
    <div className="fi1" style={{display:"flex",gap:8,marginBottom:20}}>{[{id:"received",label:"받은 요청",count:pendingReceived.length},{id:"sent",label:"보낸 요청",count:mySentRequests.filter(r=>r.status==="PENDING").length}].map(t=>
      <button key={t.id} onClick={()=>setTab(t.id)} className={tab===t.id?"btn-primary":"btn-secondary"} style={{flex:1,padding:12,fontSize:14,gap:4}}>{t.label}{t.count>0&&<span style={{background:tab===t.id?"rgba(255,255,255,.3)":"var(--emerald)",color:tab===t.id?"#fff":"#fff",borderRadius:8,padding:"2px 7px",fontSize:11,marginLeft:4}}>{t.count}</span>}</button>)}
    </div>
    {items.length===0?<EmptyState icon={tab==="received"?"📨":"📤"} title={tab==="received"?"받은 요청이 없어요":"보낸 요청이 없어요"} description={tab==="received"?"프로필을 완성하면 요청받기 쉬워져요!":"검색 후 첫 연락을 시작하세요!"} actionLabel="담당자 검색하기" onAction={()=>setActivePage("home")}/>
    :items.map(r=><RequestCard key={r.id} request={r} isSent={tab==="sent"}/>)}

    {/* Detail Modal */}
    {selectedRequest&&(()=>{const req=selectedRequest;const requester=getUserById(req.fromUserId);if(!requester)return null;
      return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",backdropFilter:"blur(8px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setSelectedRequest(null)}>
        <div role="dialog" aria-label="요청 상세" onClick={e=>e.stopPropagation()} style={{background:"var(--bg2)",borderRadius:"var(--radius-xl) var(--radius-xl) 0 0",padding:"24px 20px 36px",width:"100%",maxWidth:480,animation:"slideUp .25s ease"}}>
          <div style={{width:40,height:4,borderRadius:2,background:"var(--gray-200)",margin:"0 auto 22px"}}/>
          <h3 style={{fontSize:20,fontWeight:900,margin:"0 0 20px"}}>연락 요청 상세</h3>
          <div className="card-sm" style={{marginBottom:18,border:"1px solid var(--gray-200)"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <Avatar name={requester.name} logo={requester.companyLogo} size={52}/>
              <div><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontWeight:800,fontSize:16}}>{requester.name}</span>{requester.isVerified&&<Icon.Verified size={14}/>}</div><div style={{fontSize:13,color:"var(--gray-500)",marginTop:2}}>{requester.company} · {requester.department}</div><div style={{fontSize:12,color:"var(--gray-400)"}}>{requester.position}</div></div>
            </div>
          </div>
          <div style={{marginBottom:14}}><div style={{fontSize:12,fontWeight:700,color:"var(--gray-400)",marginBottom:8}}>요청 목적</div><PurposeBadge purposeId={req.purpose}/></div>
          {req.message&&<div style={{marginBottom:14}}><div style={{fontSize:12,fontWeight:700,color:"var(--gray-400)",marginBottom:8}}>메시지</div><div style={{fontSize:14,fontStyle:"italic",color:"var(--gray-600)",lineHeight:1.6}}>"{req.message}"</div></div>}
          <div className="card-sm" style={{background:"var(--emerald-bg)",border:"1px solid var(--emerald-border)",marginBottom:22}}>
            <p style={{fontSize:12,color:"var(--emerald)",fontWeight:600}}>💡 수락하면 서로의 전화번호가 <strong>동시에</strong> 공개됩니다.</p>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>respondToRequest(req.id,false)} className="btn-secondary" style={{flex:1,color:"var(--red)",borderColor:"rgba(239,68,68,.2)"}}><Icon.Close size={16}/> 거부</button>
            <button onClick={()=>respondToRequest(req.id,true)} className="btn-primary" style={{flex:2}}><Icon.Check size={16}/> 수락</button>
          </div>
        </div>
      </div>;
    })()}
  </main>;
}

/* ═══════════════════════════════════════════════════════════

          <h2 style={{fontFamily:"var(--font-display)",fontSize:20,fontWeight:900,margin:"0 0 4px"}}>{currentUser.name}</h2>
          <p style={{fontSize:14,color:"var(--gray-500)"}}>{currentUser.position||"직책 미입력"}</p>
          <p style={{fontSize:14,color:"var(--gray-500)",marginTop:2}}>{currentUser.company}{currentUser.department&&" · "+currentUser.department}</p>
          <p style={{fontSize:13,color:"var(--emerald)",marginTop:8,fontWeight:600}}>{currentUser.phone||"전화번호 미입력"}</p>
          <button className="btn-secondary" onClick={startEdit} style={{marginTop:16,padding:"10px 20px",fontSize:13}}>프로필 편집</button>
        </>:<div style={{textAlign:"left",display:"flex",flexDirection:"column",gap:10,marginTop:10}}>
          <input className="input-field" value={editData.name||""} onChange={e=>setEditData({...editData,name:e.target.value})} placeholder="이름" aria-label="이름"/>
          <input className="input-field" value={editData.company||""} onChange={e=>setEditData({...editData,company:e.target.value})} placeholder="회사" aria-label="회사"/>
          <input className="input-field" value={editData.department||""} onChange={e=>setEditData({...editData,department:e.target.value})} placeholder="부서" aria-label="부서"/>
          <input className="input-field" value={editData.position||""} onChange={e=>setEditData({...editData,position:e.target.value})} placeholder="직책" aria-label="직책"/>
          <input className="input-field" value={editData.phone||""} onChange={e=>setEditData({...editData,phone:e.target.value})} placeholder="전화번호" aria-label="전화번호"/>
          <textarea className="input-field" value={editData.bio||""} onChange={e=>setEditData({...editData,bio:e.target.value.slice(0,200)})} placeholder="자기소개 (200자)" aria-label="자기소개" style={{height:80,resize:"none"}}/>
          <div style={{display:"flex",gap:10}}><button className="btn-secondary" onClick={()=>setIsEditing(false)} style={{flex:1,padding:12}}>취소</button><button className="btn-primary" onClick={saveEdit} style={{flex:2,padding:12}}>저장</button></div>
        </div>}
      </article>

      {/* Completeness (지시서 2-7) */}
      <div className="card-sm fi2" style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:13,fontWeight:700}}>프로필 완성도</span><span style={{fontSize:13,fontWeight:800,color:"var(--emerald)"}}>{completenessPercent}%</span></div>
        <div style={{height:6,borderRadius:3,background:"var(--gray-200)"}}><div style={{height:"100%",borderRadius:3,background:"var(--emerald)",width:completenessPercent+"%",transition:"width .5s"}}/></div>
        {completenessPercent<100&&<p style={{fontSize:11,color:"var(--gray-400)",marginTop:6}}>💡 프로필 100% 달성 시 검색 노출 3배 증가!</p>}
      </div>

      {/* Stats */}
      <div className="card-sm fi3" style={{marginBottom:12}}>
        <h3 style={{fontSize:13,fontWeight:800,marginBottom:14}}>📊 활동 통계</h3>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          {[{label:"보낸 요청",value:mySentRequests.length,color:"var(--emerald)"},{label:"받은 요청",value:myReceivedRequests.length,color:"var(--blue)"},{label:"승인됨",value:[...mySentRequests,...myReceivedRequests].filter(r=>r.status==="ACCEPTED").length,color:"var(--emerald)"},{label:"연결됨",value:myContacts.length,color:"var(--purple)"}].map((stat,i)=><div key={i} style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:900,color:stat.color}}>{stat.value}</div><div style={{fontSize:11,color:"var(--gray-400)",marginTop:2}}>{stat.label}</div></div>)}
        </div>
      </div>

      {/* Plan (지시서 2-9) */}
      <div className="card-sm fi3" style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:13,fontWeight:700}}>현재 플랜</div><div style={{fontSize:12,color:"var(--gray-500)",marginTop:4}}>{currentUser.plan==="FREE"?"무료 — 월 5건 요청":"Pro — 월 50건 요청"}</div></div>
          <span className="badge" style={{background:currentUser.plan==="FREE"?"var(--gray-100)":"var(--emerald-bg)",color:currentUser.plan==="FREE"?"var(--gray-500)":"var(--emerald)"}}>{currentUser.plan}</span>
        </div>
      </div>
    </>}

    {/* NOTIFICATIONS TAB */}
    {activeTab==="notifs"&&<>
      {unreadNotifCount>0&&<div className="fi" style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}><button onClick={markAllRead} className="btn-secondary" style={{padding:"6px 12px",fontSize:12,minHeight:36}}>모두 읽음</button></div>}
      {myNotifications.length===0?<EmptyState icon="🔔" title="알림이 없어요" description="활동이 시작되면 여기에 표시됩니다"/>
      :myNotifications.map((notif,i)=><div key={notif.id} className="fi card-sm" style={{marginBottom:8,background:notif.isRead?"var(--white)":"var(--emerald-bg)",border:notif.isRead?"none":"1px solid var(--emerald-border)"}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
          <span style={{fontSize:18,marginTop:1}} aria-hidden="true">{notifIcons[notif.type]||"🔔"}</span>
          <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13}}>{notif.title}</div><div style={{fontSize:13,color:"var(--gray-500)",marginTop:4,lineHeight:1.6}}>{notif.body}</div><div style={{fontSize:11,color:"var(--gray-400)",marginTop:6}}>{formatTimeAgo(notif.createdAt)}</div></div>
          {!notif.isRead&&<div style={{width:8,height:8,borderRadius:4,background:"var(--emerald)",flexShrink:0,marginTop:6}}/>}
        </div>
      </div>)}
    </>}

    {/* SETTINGS TAB */}
    {activeTab==="settings"&&<>
      <div className="card-sm fi1" style={{marginBottom:12}}>
        <h3 style={{fontSize:13,fontWeight:800,marginBottom:12}}>🔒 프라이버시</h3>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:13,fontWeight:600}}>검색 노출 허용</div><div style={{fontSize:11,color:"var(--gray-400)",marginTop:4}}>끄면 다른 사용자 검색에 노출되지 않습니다</div></div>
          <button onClick={()=>{const updated={...currentUser,isSearchable:!currentUser.isSearchable};persistCurrentUser(updated);saveToStorage(STORAGE_KEYS.USERS,allUsers.map(u=>u.id===currentUser.id?updated:u));persistUsers(allUsers.map(u=>u.id===currentUser.id?updated:u));}} aria-label="검색 노출 토글" style={{width:50,height:28,borderRadius:14,border:"none",cursor:"pointer",position:"relative",background:currentUser.isSearchable?"var(--emerald)":"var(--gray-300)",transition:"background .3s",minWidth:50}}>
            <div style={{width:22,height:22,borderRadius:11,background:"#fff",position:"absolute",top:3,left:currentUser.isSearchable?25:3,transition:"left .3s",boxShadow:"var(--shadow-sm)"}}/>
          </button>
        </div>
      </div>

      {/* Data export (지시서 1-6) */}
      <div className="card-sm fi2" style={{marginBottom:12}}>
        <h3 style={{fontSize:13,fontWeight:800,marginBottom:12}}>📦 데이터 관리</h3>
        <button className="btn-secondary" onClick={()=>{
          const data={contacts:myContacts.map(c=>({...c,user:getUserById(c.contactUserId)})),requests:mySentRequests};
          const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
          const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="bizconnect-data.json";a.click();URL.revokeObjectURL(url);
          showToast("데이터를 내보냈습니다!");
        }} style={{width:"100%",padding:"10px 16px",fontSize:13}}>📥 내 데이터 내보내기 (JSON)</button>
      </div>

      <button className="fi3 btn-secondary" onClick={handleLogout} style={{width:"100%",color:"var(--red)",borderColor:"rgba(239,68,68,.2)",marginBottom:20,gap:8}}><Icon.LogOut size={18}/> 로그아웃</button>
      <p style={{textAlign:"center",fontSize:11,color:"var(--gray-400)",paddingBottom:12}}>BizConnect v2.0</p>
    </>}
  </main>;
}

/* ═══════════════════════════════════════════════════════════
   SECTION: Loading Screen
   ═══════════════════════════════════════════════════════════ */
function LoadingScreen(){
  return <div role="status" aria-label="로딩 중" style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100dvh",flexDirection:"column",gap:12,background:"var(--bg)"}}>
    <div style={{fontSize:48}}>🤝</div>
    <div style={{fontSize:22,fontWeight:900}}><span style={{color:"var(--emerald)"}}>Biz</span>Connect</div>
    <div style={{display:"flex",gap:6,marginTop:8}}><div className="skel" style={{width:8,height:8,borderRadius:4}}/><div className="skel" style={{width:8,height:8,borderRadius:4,animationDelay:".2s"}}/><div className="skel" style={{width:8,height:8,borderRadius:4,animationDelay:".4s"}}/></div>
  </div>;
}

/* ═══════════════════════════════════════════════════════════
   SECTION: App Root & Mount
   ═══════════════════════════════════════════════════════════ */
function App(){
  const{currentUser,activePage,selectedUser,isReady}=useApp();

  if(!isReady)return <LoadingScreen/>;
  if(!currentUser)return <><ToastNotification/><LandingPage/></>;

  const pageComponents={
    home:selectedUser?<ProfilePage/>:<HomePage/>,
    profile:selectedUser?<ProfilePage/>:<HomePage/>,
    signals:<SignalsPage/>,
    inbox:<InboxPage/>,
    contacts:<ContactsPage/>,
    me:<MyPage/>,
  };

  return <>
    <ToastNotification/>
    <div style={{height:"100dvh",display:"flex",flexDirection:"column"}}>
      <div className="safe-bottom" style={{flex:1,overflowY:"auto"}}>
        {pageComponents[activePage]||<HomePage/>}
      </div>
      <BottomNavigation/>
    </div>
  </>;
}

// Mount
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<AppProvider><App/></AppProvider>);
</script>
</body>
</html>
